  android-workflow:
    name: Android App Workflow
    instance_type: linux_x2
    environment:
      vars:
        BUNDLE_ID: "com.weam.app"
        GRADLE_OPTS: "-Xmx4g -XX:+UseParallelGC"
      android_signing:
        - keystore_reference
    triggering:
      events:
        - push
        - pull_request
      branch:
        include:
          - main
          - release/*
    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Build Android app
        script: |
          flutter build appbundle --release

      - name: Generate signed APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/apk/release/app-release.apk
      - flutter_drive.log
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: production
        submit_as_draft: true

  publish-workflow:
    name: Publish to App Stores
    instance_type: mac_mini_m1
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.weam.app
    triggering:
      events:
        - tag
      tag:
        pattern: '^v\d+\.\d+\.\d+$'
    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Build and publish iOS
        script: |
          flutter build ios --release --no-codesign
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/ios_build \
            -archivePath build/ios_build/Runner.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath build/ios_build/Runner.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ios_build/ipa
          cd ..

      - name: Build and publish Android
        script: flutter build appbundle --release

    artifacts:
      - ios/build/ios_build/ipa/**/*.ipa
      - build/app/outputs/bundle/release/app-release.aab
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: $APP_STORE_CONNECT_CREDENTIALS
        submit_to_testflight: false
        submit_to_app_store: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: production
        submit_as_draft: false
