workflows:
  default-workflow:
    name: Build iOS & Android
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.weam.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Generate native project files
        script: |
          # Remove old Android build files that conflict with flutter create
          rm -rf android/
          # Generate fresh native project files for both platforms
          flutter create . --org com.weam --project-name weam --platforms ios,android
          # Fix Android applicationId and namespace to com.weam.app
          sed -i '' 's/com\.weam\.weam/com.weam.app/g' android/app/build.gradle.kts || true
          sed -i '' 's/com\.weam\.weam/com.weam.app/g' android/app/build.gradle || true
          sed -i '' 's/com\.weam\.weam/com.weam.app/g' android/app/src/main/AndroidManifest.xml || true
          sed -i '' 's/com\.weam\.weam/com.weam.app/g' android/app/src/main/kotlin/com/weam/weam/MainActivity.kt || true
          # Move MainActivity to correct package directory if needed
          if [ -d "android/app/src/main/kotlin/com/weam/weam" ]; then
            mkdir -p android/app/src/main/kotlin/com/weam/app
            mv android/app/src/main/kotlin/com/weam/weam/MainActivity.kt android/app/src/main/kotlin/com/weam/app/ 2>/dev/null || true
            rm -rf android/app/src/main/kotlin/com/weam/weam
          fi

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Set up iOS signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
        ignore_failure: true

      - name: Build Android AAB
        script: |
          flutter build appbundle --release

      - name: Build Android APK
        script: |
          flutter build apk --release

      - name: Build iOS
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
        ignore_failure: true

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/apk/release/app-release.apk
      - build/ios/ipa/*.ipa
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - mouayad.balloul@gmail.com
        notify:
          success: true
          failure: true
