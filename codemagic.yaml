workflows:
  default-workflow:
    name: Build iOS & Android
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_credentials
      vars:
        BUNDLE_ID: "com.weam.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Generate native project files
        script: |
          flutter create . --org com.weam --project-name weam --platforms ios,android

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Set up iOS signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
        ignore_failure: true

      - name: Build Android AAB
        script: |
          flutter build appbundle --release

      - name: Build Android APK
        script: |
          flutter build apk --release

      - name: Build iOS
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
        ignore_failure: true

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/apk/release/app-release.apk
      - build/ios/ipa/*.ipa
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - mouayad.balloul@gmail.com
        notify:
          success: true
          failure: true
