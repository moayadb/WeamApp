workflows:
  default-workflow:
    name: Build iOS & Android
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: "com.weam.app"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Generate native project files
        script: |
          # Remove old Android build files that conflict with flutter create
          rm -rf android/
          # Generate fresh native project files for both platforms
          flutter create . --org com.weam --project-name weam --platforms ios,android
          # Fix bundle ID from com.weam.weam to com.weam.app in all generated files
          find . -name "*.gradle" -o -name "*.gradle.kts" -o -name "*.xml" -o -name "*.kt" -o -name "*.pbxproj" -o -name "*.plist" | xargs sed -i '' 's/com\.weam\.weam/com.weam.app/g' 2>/dev/null || true
          # Move Android MainActivity to correct package directory if needed
          if [ -d "android/app/src/main/kotlin/com/weam/weam" ]; then
            mkdir -p android/app/src/main/kotlin/com/weam/app
            mv android/app/src/main/kotlin/com/weam/weam/MainActivity.kt android/app/src/main/kotlin/com/weam/app/ 2>/dev/null || true
            rm -rf android/app/src/main/kotlin/com/weam/weam
          fi

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Set up iOS signing
        script: |
          keychain initialize
          # Generate a fresh certificate private key for code signing
          openssl genrsa -out /tmp/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build Android AAB
        script: |
          flutter build appbundle --release

      - name: Build Android APK
        script: |
          flutter build apk --release

      - name: Build iOS
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/apk/release/app-release.apk
      - build/ios/ipa/*.ipa
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - mouayad.balloul@gmail.com
        notify:
          success: true
          failure: true
